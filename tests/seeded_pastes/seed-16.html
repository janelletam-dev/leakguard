<head><title>Re: how do I find my AWS access key ID?</title></head>
<body>
<pre>
Your access key ID always starts with AKIA and is 20 characters, like this sample:

AKIA1234567890ABCDEF

You'll find yours in IAM → Users → Security credentials. That's just a dummy I typed to show
the shape — not a working key. Rotate yours if it was ever shared.
</pre>
